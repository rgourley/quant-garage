<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>quant-garage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --surface: #fafaf7;
    --muted: #6b6b6b;
    --muted-dark: #a8a39a;
    --border: #e8e5df;
    --border-dark: rgba(250, 250, 247, 0.18);
    --accent: #e84d1a;
    --green: #0d7e4f;
    --red: #9f1212;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    background: var(--ink);
    color: var(--surface);
    font-family: "IBM Plex Sans Condensed", system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    width: 1200px;
    height: 630px;
    padding: 56px 64px 50px;
    display: flex;
    flex-direction: column;
  }
  /* Top branding bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--surface);
  }
  .brand {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .brand-name {
    font-weight: 500;
    opacity: 0.85;
  }
  .brand-tag {
    color: var(--accent);
    opacity: 1;
  }
  .brand-url {
    color: var(--surface);
    opacity: 0.5;
  }
  /* Kicker */
  .kicker {
    margin-top: 56px;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
  }
  /* Title */
  .title {
    margin-top: 18px;
    font-family: "IBM Plex Sans Condensed", sans-serif;
    font-size: 120px;
    font-weight: 700;
    line-height: 1.04;
    letter-spacing: -0.025em;
    color: var(--surface);
    max-width: 1080px;
  }
  .title .accent { color: var(--accent); }
  /* Spacer */
  .spacer { flex: 1; }
  /* Stat row above hairline */
  .stat-row {
    display: flex;
    align-items: baseline;
    gap: 28px;
    border-top: 1px solid var(--border-dark);
    padding-top: 26px;
    margin-top: 16px;
  }
  .big-value {
    font-family: "IBM Plex Sans Condensed", sans-serif;
    font-size: 64px;
    font-weight: 700;
    color: var(--surface);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .meta {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted-dark);
    padding-bottom: 6px;
  }
  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted-dark);
  }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div class="brand">
      <span class="brand-name">QUANT GARAGE</span>
      <span class="brand-tag">// ANALYST SKILLS</span>
    </div>
    <span class="brand-url">github.com/rgourley/quant-garage</span>
  </div>

  <div class="kicker">// CLAUDE SKILLS · MIT · OPEN SOURCE</div>

  <div class="title">Analyst workflows.<br>Without the<span class="accent"> desk.</span></div>

  <div class="spacer"></div>

  <div class="stat-row">
    <div class="big-value" style="font-size: 52px;">41 tools · 8 workflows.</div>
    <div class="meta">Every output cited to a live API call</div>
  </div>

  <div class="footer">
    <span>QUANT GARAGE · v0.1 · MIT</span>
    <span>GITHUB.COM/RGOURLEY/QUANT-GARAGE</span>
  </div>

</div>
</body>
</html>
