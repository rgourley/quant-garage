name: portfolio-review
kind: skill
interface: rest
output_mode: hybrid
foundations:
  - massive-api-patterns
requires:
  - product: stocks
    tier: starter
realtime: no
tick_history: no
endpoints:
  - GET /v2/aggs/ticker/{ticker}/range/1/day/{from}/{to}
  - GET /v2/reference/news
  - GET /v3/reference/tickers/{ticker}
  - GET https://data.sec.gov/submissions/CIK{cik}.json
notes: |
  Composite skill. Chains 7 sub-skills into one invocation:
  market-regime, sector-rotation-signal, risk-report, earnings-
  blackout, macro-event-calendar, corporate-actions-scanner,
  portfolio-rebalancer. All sub-skills are library-importable so
  no shelling out and no file I/O.

  Shares a single MassiveClient across sub-skills for connection
  reuse and cache-hit benefits on shared tickers (SPY appears in
  market-regime, sector-rotation, risk-report, macro-event-calendar,
  and portfolio-rebalancer benchmarks).

  Endpoints listed are the union of what the sub-skills call.
  Individual sub-skills declare their own requires.yml with tier
  detail; this skill inherits the max tier requirement.
fallbacks: []
