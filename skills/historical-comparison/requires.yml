name: historical-comparison
kind: skill
interface: rest
output_mode: hybrid
foundations:
  - massive-api-patterns
requires:
  - product: stocks
    tier: starter
realtime: no
tick_history: no
endpoints:
  - GET /v2/aggs/ticker/{ticker}/range/1/day/{from}/{to}
notes: |
  Composite. Chains event-study (single ticker + event class) with
  historical-analog-finder (market-wide K nearest regime analogs).
  Both use daily-aggs pulls; heavy-side is the 20yr SPY history for
  the analog.

  Analog-only mode (include_event=False) skips the event-study side
  and just returns the market regime forward distribution.
fallbacks:
  - historical-analog-finder
