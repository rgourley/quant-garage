name: market-regime
kind: skill
interface: rest
output_mode: hybrid
foundations:
  - massive-api-patterns
requires:
  - product: stocks
    tier: starter
realtime: no
tick_history: no
tiers:
  default:
    label: "Stocks Starter (REST daily aggregates)"
    needs:
      - product: stocks
        tier: starter
    enables: [daily_regime_briefing, vix_state, sector_leadership, breadth_proxy]
    loses: [intraday_regime, full_advance_decline_breadth, macro_overlay]
endpoints:
  - GET /v2/aggs/ticker/{ticker}/range/1/day/{from}/{to}
notes: |
  13 daily-aggs calls per run (SPY, VIX, XLK, XLF, XLE, XLV, XLY, XLP,
  XLI, XLB, XLU, XLRE, XLC), well under the Stocks Starter rate limit.
  Per-ticker module-level cache so any re-use within a run (SPY as
  trend subject AND RS denominator) collapses to one call.

  VIX serves under either `VIX` or `I:VIX` depending on key entitlement.
  The script tries `VIX` first, falls back to `I:VIX` if empty, and
  surfaces a tier_caveat when both fail (regime still resolves on the
  other three blocks).

  Breadth is computed from the 11 sector ETFs as a proxy. Surfaced as a
  caveat in every run so consumers know this is not the full A/D line.
  Sufficient for a regime read, not for fine-grain breadth divergence
  analysis. Swapping the sector loop for a universe scan (from
  universe-builder) is a clean PR extension.
fallbacks: []
