name: scan-and-frame
kind: skill
interface: rest
output_mode: hybrid
foundations:
  - massive-api-patterns
requires:
  - product: stocks
    tier: starter
realtime: no
tick_history: no
endpoints:
  - GET /v2/aggs/ticker/{ticker}/range/1/day/{from}/{to}
  - GET /v3/reference/tickers
  - GET /v2/aggs/grouped/locale/us/market/stocks/{date}
notes: |
  Composite. Chains market-regime + universe-builder + relative-
  strength (light, default) with optional factor-research (heavy).

  factor-research adds a full factor panel (multi-year, 200 names)
  and dominates runtime. Only enable for weekly cadence.

  Discovery-mode. For position-level review use portfolio-review.
fallbacks:
  - universe-builder
