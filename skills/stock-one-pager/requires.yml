name: stock-one-pager
kind: skill
interface: rest
output_mode: note
foundations:
  - massive-api-patterns
requires:
  - product: stocks
    tier: starter
realtime: no
tick_history: no
endpoints:
  - GET /v2/aggs/ticker/{ticker}/range/1/day/{from}/{to}
  - GET /v2/snapshot/locale/us/markets/stocks/tickers/{ticker}
  - GET /v3/reference/tickers/{ticker}
notes: |
  Composite skill. Chains technical-briefing + earnings-blackout +
  market-regime into a plain-language card. All sub-skills are
  library-importable so no shelling out and no file I/O.

  Shares a single MassiveClient across sub-skills for connection
  reuse. Optional `include_market_context=False` when running in a
  tight loop over many tickers to skip the 12-ETF market-regime
  pull per call.

  Retail-tier design bar: a first-time trader understands the output
  without a glossary. If a user needs analyst-tier depth (valuation,
  factor context, options positioning), invoke those skills directly.
fallbacks:
  - technical-briefing
